guidance:
  style: Corporate Minimalism
  strategy: Dual-Context
  consumerMerchant: Generous whitespace, high contrast, and human-readable projections.
  adminIssuer: Dense governance grids, audit visibility, and explicit authority.
  colorRules:
    - Use primary-container #2368D9 for critical actions.
    - Pair every semantic foreground token with its matching background token.
    - Use high-contrast-focus for focus rings.
  typographyRules:
    - Use tabular lining figures for balances and metrics.
    - Never truncate financial amounts.
    - Permit two-line mobile labels in xlarge accessibility mode.
  layoutRules:
    - Mobile uses 20px gutters and 56px minimum CTA height.
    - Web uses a 240px rail, 44px table rows, and 12px column padding.
    - Collapse web navigation below 1280px while preserving 44px targets.
  componentRules:
    - Buttons use 12px radius; primary is solid and secondary is tinted.
    - Status badges use semantic token pairs, label typography, icon, and text.
    - Web panels use tonal layers and low-contrast outlines.
    - Inputs use 12px radius and a 2px primary or high-contrast focus border.
