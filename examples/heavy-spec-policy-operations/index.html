<!doctype html>
<html
  lang="ko"
  data-source-sha256="b4b50cd9c1d2321c8936126c00c3ff242bb88ba5445c26abfffc03187993df33"
>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="AAWP demo bundle viewer for independent policy, circulation, issuance and reserve screens"
    />
    <title>경기 통합월렛 · 화면 묶음</title>
    <link rel="stylesheet" href="./design-tokens.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">GG</span>
        <div><strong>경기 통합월렛</strong><small>Demo bundle viewer</small></div>
      </div>
      <div class="source-status">
        <span id="manifest-status">Manifest loading</span><code>22 / 102</code>
      </div>
    </header>
    <main class="workspace">
      <section class="collection-switcher" aria-labelledby="bundle-heading">
        <div class="collection-heading">
          <div>
            <span class="eyebrow">DEMO COLLECTION</span>
            <h1 id="bundle-heading">요청한 화면 묶음</h1>
            <p id="request-text"></p>
          </div>
          <div id="bundle-list" class="bundle-list" role="list"></div>
        </div>
        <div class="screen-switcher">
          <div class="bundle-summary">
            <strong id="selected-bundle-title"></strong>
            <small id="selected-bundle-description"></small>
          </div>
          <label class="compact-select"
            ><span>Surface</span
            ><select id="surface-select"></select
          ></label>
          <label class="compact-select screen-select"
            ><span>Screen</span
            ><select id="screen-select"></select
          ></label>
        </div>
      </section>
      <section class="viewer" aria-label="선택한 화면 묶음">
        <header class="preview-head">
          <div>
            <div class="preview-meta">
              <span id="selected-surface"></span><span id="selected-group"></span>
            </div>
            <h2 id="selected-screen-title"></h2>
            <code id="selected-screen-route"></code>
          </div>
          <a id="screen-open-link" target="_blank" rel="noopener noreferrer">독립 화면 열기</a>
        </header>
        <div id="device-frame" class="device-frame">
          <iframe
            id="screen-frame"
            title="선택한 독립 demo 화면"
            sandbox="allow-scripts allow-same-origin"
          ></iframe>
        </div>
      </section>
    </main>
    <div id="viewer-notice" class="viewer-notice" role="status" aria-live="polite" hidden></div>
    <p id="error-message" class="error-message" hidden></p>
    <script src="./app.js"></script>
  </body>
</html>
