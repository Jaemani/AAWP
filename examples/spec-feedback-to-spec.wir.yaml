apiVersion: awf/v1
id: spec-feedback-to-spec
version: 0.3.0
mode: CONTRACT
artifactSchemas:
  - type: artifact.spec
    schemaVersion: 1.0.0
    schema: { type: object }
  - type: artifact.spec-feedback
    schemaVersion: 1.0.0
    schema: { type: object }
  - type: artifact.spec-feedback-contract
    schemaVersion: 1.0.0
    schema: { type: object }
  - type: artifact.spec-patch-proposal
    schemaVersion: 1.0.0
    schema: { type: object }
  - type: artifact.spec-revision-candidate
    schemaVersion: 1.0.0
    schema: { type: object }
  - type: artifact.verdict
    schemaVersion: 1.0.0
    schema: { type: object }
  - type: artifact.spec-gap-report
    schemaVersion: 1.0.0
    schema: { type: object }
  - type: artifact.spec-impact-report
    schemaVersion: 1.0.0
    schema: { type: object }
  - type: artifact.spec-maturity-verdict
    schemaVersion: 1.0.0
    schema: { type: object }
  - type: artifact.spec-traceability-report
    schemaVersion: 1.0.0
    schema: { type: object }
inputs:
  source:
    type: artifact.spec
    schemaVersion: 1.0.0
    visibility: public
  feedback:
    type: artifact.spec-feedback
    schemaVersion: 1.0.0
    visibility: public
outputs:
  revision:
    type: artifact.spec-revision-candidate
    schemaVersion: 1.0.0
    visibility: public
  verdict:
    type: artifact.verdict
    schemaVersion: 1.0.0
    visibility: public
  gaps:
    type: artifact.spec-gap-report
    schemaVersion: 1.0.0
    visibility: public
  impact:
    type: artifact.spec-impact-report
    schemaVersion: 1.0.0
    visibility: public
  maturity:
    type: artifact.spec-maturity-verdict
    schemaVersion: 1.0.0
    visibility: public
  traceability:
    type: artifact.spec-traceability-report
    schemaVersion: 1.0.0
    visibility: public
verifierDefinitions:
  - id: spec-revision-check
    owner: { id: spec-verifier, role: verifier }
    visibility: hidden
scopePolicy:
  sourceMutation: forbidden
  promotionRequiresApproval: true
  allowedSecrets: []
  allowedNetworkHosts: []
  maxWorkflowCostUsd: 3
nodes:
  - id: compile-feedback
    displayName: 피드백·성숙도 계약 고정
    description: 두 입력의 byte/canonical digest, stable feedback ID, 수정 권한과 목표 maturity 고정
    kind: deterministic
    version: 2.0.0
    owner: { id: spec-maintainer, role: builder }
    inputs:
      feedback: { type: artifact.spec-feedback, schemaVersion: 1.0.0, visibility: public }
    outputs:
      contract: { type: artifact.spec-feedback-contract, schemaVersion: 1.0.0, visibility: public }
    reads: []
    writes: []
    capabilities:
      { filesystemRead: [], filesystemWrite: [], network: [], tools: [], secretRefs: [] }
    budget: { maxAttempts: 1, timeoutSec: 30, maxCostUsd: 0 }
    cache: { mode: exact, includeModelRevision: false, includeEnvironmentDigest: true }
    verifiers: []
    retryPolicy: { retryableClasses: [], backoff: fixed }
  - id: propose-patch
    displayName: 근거 보존형 Spec 수정안 작성
    description: 확정·가정·미결을 구분하고 canonical section과 Demo compatibility projection을 함께 수정
    kind: llm
    version: 2.0.0
    owner: { id: spec-editor, role: builder }
    inputs:
      source: { type: artifact.spec, schemaVersion: 1.0.0, visibility: public }
      contract: { type: artifact.spec-feedback-contract, schemaVersion: 1.0.0, visibility: public }
    outputs:
      proposal: { type: artifact.spec-patch-proposal, schemaVersion: 1.0.0, visibility: public }
    reads: []
    writes: []
    capabilities:
      { filesystemRead: [], filesystemWrite: [], network: [], tools: [], secretRefs: [] }
    budget: { maxAttempts: 1, timeoutSec: 1800, maxTokens: 60000, maxCostUsd: 2.5 }
    cache: { mode: exact, includeModelRevision: true, includeEnvironmentDigest: true }
    verifiers: []
    retryPolicy: { retryableClasses: [capacity], backoff: fixed }
  - id: materialize-revision
    displayName: Immutable child Spec 생성
    description: 제안 patch를 원본에 결정적으로 적용하고 단일 candidate 파일과 lineage envelope 발행
    kind: deterministic
    version: 2.0.0
    owner: { id: spec-maintainer, role: builder }
    inputs:
      source: { type: artifact.spec, schemaVersion: 1.0.0, visibility: public }
      proposal: { type: artifact.spec-patch-proposal, schemaVersion: 1.0.0, visibility: public }
    outputs:
      candidate:
        { type: artifact.spec-revision-candidate, schemaVersion: 1.0.0, visibility: public }
    reads: []
    writes: []
    capabilities:
      { filesystemRead: [], filesystemWrite: [], network: [], tools: [], secretRefs: [] }
    budget: { maxAttempts: 1, timeoutSec: 60, maxCostUsd: 0 }
    cache: { mode: exact, includeModelRevision: false, includeEnvironmentDigest: true }
    verifiers: []
    retryPolicy: { retryableClasses: [], backoff: fixed }
  - id: verify-revision
    displayName: 구조·업무 의미·성숙도 독립 검증
    description: patch 재현, baseline 보존, 공통 화면·command·데이터 관계, maturity blocker와 traceability 판정
    kind: judge
    version: 2.0.0
    owner: { id: spec-verifier, role: verifier }
    inputs:
      candidate:
        { type: artifact.spec-revision-candidate, schemaVersion: 1.0.0, visibility: public }
    outputs:
      verdict: { type: artifact.verdict, schemaVersion: 1.0.0, visibility: public }
      gaps: { type: artifact.spec-gap-report, schemaVersion: 1.0.0, visibility: public }
      impact: { type: artifact.spec-impact-report, schemaVersion: 1.0.0, visibility: public }
      maturity: { type: artifact.spec-maturity-verdict, schemaVersion: 1.0.0, visibility: public }
      traceability:
        { type: artifact.spec-traceability-report, schemaVersion: 1.0.0, visibility: public }
    reads: []
    writes: []
    capabilities:
      { filesystemRead: [], filesystemWrite: [], network: [], tools: [], secretRefs: [] }
    budget: { maxAttempts: 1, timeoutSec: 120, maxCostUsd: 0 }
    cache: { mode: verified, includeModelRevision: false, includeEnvironmentDigest: true }
    verifiers:
      - { verifierId: spec-revision-check, required: true, phase: release }
    retryPolicy: { retryableClasses: [], backoff: fixed }
edges:
  - source: { kind: workflowInput, port: feedback }
    target: { kind: nodeInput, nodeId: compile-feedback, port: feedback }
  - source: { kind: workflowInput, port: source }
    target: { kind: nodeInput, nodeId: propose-patch, port: source }
  - source: { kind: nodeOutput, nodeId: compile-feedback, port: contract }
    target: { kind: nodeInput, nodeId: propose-patch, port: contract }
  - source: { kind: workflowInput, port: source }
    target: { kind: nodeInput, nodeId: materialize-revision, port: source }
  - source: { kind: nodeOutput, nodeId: propose-patch, port: proposal }
    target: { kind: nodeInput, nodeId: materialize-revision, port: proposal }
  - source: { kind: nodeOutput, nodeId: materialize-revision, port: candidate }
    target: { kind: nodeInput, nodeId: verify-revision, port: candidate }
  - source: { kind: nodeOutput, nodeId: materialize-revision, port: candidate }
    target: { kind: workflowOutput, port: revision }
  - source: { kind: nodeOutput, nodeId: verify-revision, port: verdict }
    target: { kind: workflowOutput, port: verdict }
  - source: { kind: nodeOutput, nodeId: verify-revision, port: gaps }
    target: { kind: workflowOutput, port: gaps }
  - source: { kind: nodeOutput, nodeId: verify-revision, port: impact }
    target: { kind: workflowOutput, port: impact }
  - source: { kind: nodeOutput, nodeId: verify-revision, port: maturity }
    target: { kind: workflowOutput, port: maturity }
  - source: { kind: nodeOutput, nodeId: verify-revision, port: traceability }
    target: { kind: workflowOutput, port: traceability }
releasePolicy:
  requiredVerifiers: [spec-revision-check]
  maxBlockingFindings: 0
  requireDirectBaseline: false
