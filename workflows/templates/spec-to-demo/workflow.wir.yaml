apiVersion: awf/v1
id: spec-to-demo
version: 0.6.0
mode: CONTRACT
artifactSchemas:
  - type: artifact.brief
    schemaVersion: 1.0.0
    schema:
      type: object
      required:
        [
          schemaVersion,
          sourceSpec,
          designContract,
          requestedScreens,
          selectionContract,
          demoArtifact
        ]
  - type: artifact.demo
    schemaVersion: 1.0.0
    schema:
      type: object
  - type: artifact.selection-contract
    schemaVersion: 1.0.0
    schema:
      type: object
  - type: artifact.verdict
    schemaVersion: 1.0.0
    schema:
      type: object
  - type: artifact.findings
    schemaVersion: 1.0.0
    schema:
      type: object
inputs:
  brief:
    type: artifact.brief
    schemaVersion: 1.0.0
    visibility: public
outputs:
  demo:
    type: artifact.verdict
    schemaVersion: 1.0.0
    visibility: public
verifierDefinitions:
  - id: release-check
    owner: { id: verifier-team, role: verifier }
    visibility: hidden
scopePolicy:
  allowedSecrets: []
  allowedNetworkHosts: []
  maxWorkflowCostUsd: 15
nodes:
  - id: compile-demo-scope
    displayName: 데모 범위·의존성 계약 검사
    description: 명시적 진입 화면·선택 화면·flow dependency·legacy projection 충돌을 모델 호출 전에 검사
    kind: deterministic
    version: 1.0.0
    owner: { id: compiler-team, role: builder }
    inputs:
      input: { type: artifact.brief, schemaVersion: 1.0.0, visibility: public }
    outputs:
      selection: { type: artifact.selection-contract, schemaVersion: 1.0.0, visibility: public }
    reads:
      - runs/requests/**
    writes: [runs/run_*/artifacts/selection/selection-contract.json]
    capabilities:
      filesystemRead: [runs/requests/**]
      filesystemWrite: [runs/run_*/artifacts/selection/selection-contract.json]
      network: []
      tools: [node]
      secretRefs: []
    budget: { maxAttempts: 1, timeoutSec: 30, maxCostUsd: 0 }
    cache: { mode: disabled, includeModelRevision: true, includeEnvironmentDigest: true }
    verifiers: []
    retryPolicy: { retryableClasses: [], backoff: fixed }
  - id: build-demo
    displayName: 데모 화면 구현
    description: 요청 화면의 HTML·CSS·상호작용 artifact 생성
    kind: llm
    version: 1.0.0
    owner: { id: builder-team, role: builder }
    inputs:
      input: { type: artifact.brief, schemaVersion: 1.0.0, visibility: public }
      selection: { type: artifact.selection-contract, schemaVersion: 1.0.0, visibility: public }
    outputs:
      output: { type: artifact.demo, schemaVersion: 1.0.0, visibility: public }
    reads:
      - DESIGN.md
      - workflows/templates/spec-to-demo/WORKFLOW.md
      - runs/requests/**
    writes: [runs/run_*/artifacts/demo/**]
    capabilities:
      filesystemRead:
        - DESIGN.md
        - workflows/templates/spec-to-demo/WORKFLOW.md
        - runs/requests/**
      filesystemWrite: [runs/run_*/artifacts/demo/**]
      network: []
      tools: [codex]
      secretRefs: []
    budget: { maxAttempts: 1, timeoutSec: 1800, maxCostUsd: 9.5 }
    cache: { mode: disabled, includeModelRevision: true, includeEnvironmentDigest: true }
    verifiers: []
    retryPolicy: { retryableClasses: [capacity], backoff: fixed }
  - id: inspect-release
    displayName: 초기 품질 검사
    description: 레이아웃·오버플로·상호작용 release finding 생성
    kind: judge
    version: 1.0.0
    owner: { id: verifier-team, role: verifier }
    inputs:
      input: { type: artifact.demo, schemaVersion: 1.0.0, visibility: hidden }
    outputs:
      output: { type: artifact.findings, schemaVersion: 1.0.0, visibility: hidden }
    reads:
      - DESIGN.md
      - runs/requests/**
      - runs/run_*/artifacts/demo/**
    writes: [runs/run_*/artifacts/verification/initial-findings.json]
    capabilities:
      filesystemRead:
        - DESIGN.md
        - runs/requests/**
        - runs/run_*/artifacts/demo/**
      filesystemWrite: [runs/run_*/artifacts/verification/initial-findings.json]
      network: []
      tools: [node]
      secretRefs: []
    budget: { maxAttempts: 1, timeoutSec: 120, maxCostUsd: 0 }
    cache: { mode: disabled, includeModelRevision: true, includeEnvironmentDigest: true }
    verifiers: []
    retryPolicy: { retryableClasses: [], backoff: fixed }
  - id: repair-demo
    displayName: 제한 수정
    description: 초기 finding 범위에서 demo artifact를 한 번 수정
    kind: tool
    version: 1.0.0
    owner: { id: repair-team, role: operator }
    inputs:
      candidate: { type: artifact.demo, schemaVersion: 1.0.0, visibility: public }
      findings: { type: artifact.findings, schemaVersion: 1.0.0, visibility: hidden }
    outputs:
      output: { type: artifact.demo, schemaVersion: 1.0.0, visibility: public }
    reads:
      - DESIGN.md
      - runs/requests/**
      - runs/run_*/artifacts/demo/**
      - runs/run_*/artifacts/verification/initial-findings.json
    writes:
      - runs/run_*/artifacts/demo/app.js
      - runs/run_*/artifacts/demo/index.html
      - runs/run_*/artifacts/demo/styles.css
    capabilities:
      filesystemRead:
        - DESIGN.md
        - runs/requests/**
        - runs/run_*/artifacts/demo/**
        - runs/run_*/artifacts/verification/initial-findings.json
      filesystemWrite:
        - runs/run_*/artifacts/demo/app.js
        - runs/run_*/artifacts/demo/index.html
        - runs/run_*/artifacts/demo/styles.css
      network: []
      tools: [codex, node]
      secretRefs: []
    budget: { maxAttempts: 1, timeoutSec: 900, maxCostUsd: 4.5 }
    cache: { mode: disabled, includeModelRevision: true, includeEnvironmentDigest: true }
    verifiers: []
    retryPolicy: { retryableClasses: [capacity], backoff: fixed }
  - id: verify-release
    displayName: 최종 릴리스 검증
    description: 수정 candidate를 동일 acceptance로 재검증
    kind: judge
    version: 1.0.0
    owner: { id: verifier-team, role: verifier }
    inputs:
      input: { type: artifact.demo, schemaVersion: 1.0.0, visibility: hidden }
    outputs:
      output: { type: artifact.verdict, schemaVersion: 1.0.0, visibility: public }
    reads:
      - DESIGN.md
      - runs/requests/**
      - runs/run_*/artifacts/demo/**
    writes: []
    capabilities:
      filesystemRead:
        - DESIGN.md
        - runs/requests/**
        - runs/run_*/artifacts/demo/**
      filesystemWrite: []
      network: []
      tools: [node]
      secretRefs: []
    budget: { maxAttempts: 1, timeoutSec: 120, maxCostUsd: 0 }
    cache: { mode: disabled, includeModelRevision: true, includeEnvironmentDigest: true }
    verifiers:
      - verifierId: release-check
        required: true
        phase: release
    retryPolicy: { retryableClasses: [], backoff: fixed }
edges:
  - source: { kind: workflowInput, port: brief }
    target: { kind: nodeInput, nodeId: compile-demo-scope, port: input }
  - source: { kind: workflowInput, port: brief }
    target: { kind: nodeInput, nodeId: build-demo, port: input }
  - source: { kind: nodeOutput, nodeId: compile-demo-scope, port: selection }
    target: { kind: nodeInput, nodeId: build-demo, port: selection }
  - source: { kind: nodeOutput, nodeId: build-demo, port: output }
    target: { kind: nodeInput, nodeId: inspect-release, port: input }
  - source: { kind: nodeOutput, nodeId: inspect-release, port: output }
    target: { kind: nodeInput, nodeId: repair-demo, port: findings }
  - source: { kind: nodeOutput, nodeId: build-demo, port: output }
    target: { kind: nodeInput, nodeId: repair-demo, port: candidate }
  - source: { kind: nodeOutput, nodeId: repair-demo, port: output }
    target: { kind: nodeInput, nodeId: verify-release, port: input }
  - source: { kind: nodeOutput, nodeId: verify-release, port: output }
    target: { kind: workflowOutput, port: demo }
releasePolicy:
  requiredVerifiers: [release-check]
  maxBlockingFindings: 0
  requireDirectBaseline: true
